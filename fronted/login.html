<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Zone — Acceso</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="card login-card">
        <img src="logo.jpeg" alt="Lobby Zone" class="login-logo">

        <h1 class="login-brand">LOBBY ZONE</h1>
        <p class="login-tagline">Panel de control</p>

        <input id="usuario" placeholder="Usuario" autocomplete="username">
        <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">

        <button class="btn" style="width: 100%; margin-top: 12px;" onclick="login()">Ingresar</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
